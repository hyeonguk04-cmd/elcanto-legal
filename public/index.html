<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기업 법령·회계 통합 검색</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }
    .typing-cursor {
      animation: blink 1s infinite;
    }
    
    /* 프린트 스타일 */
    @media print {
      /* 헤더, 버튼, 카테고리 선택 등 숨기기 */
      .no-print {
        display: none !important;
      }
      
      /* 페이지 여백 설정 */
      @page {
        margin: 2cm;
        size: A4;
      }
      
      body {
        background: white !important;
        padding: 0;
        margin: 0;
      }
      
      /* 프린트 전용 헤더 */
      .print-header {
        display: block !important;
        border-bottom: 2px solid #334155;
        padding-bottom: 1rem;
        margin-bottom: 2rem;
      }
      
      /* 프린트 시 높이 제한 해제 */
      .max-h-\[600px\] {
        max-height: none !important;
      }
      
      /* 프린트 시 스크롤 해제 */
      .overflow-y-auto {
        overflow: visible !important;
      }
      
      /* 대화 이력 컨테이너 */
      .conversation-container {
        max-height: none !important;
        overflow: visible !important;
      }
      
      /* 대화 이력 스타일 */
      .conversation-item {
        page-break-inside: avoid;
        margin-bottom: 1.5rem;
        border: 1px solid #e2e8f0;
        padding: 1rem;
        border-radius: 8px;
      }
      
      /* 질문 스타일 */
      .question-bubble {
        background-color: #f1f5f9 !important;
        color: #1e293b !important;
        border: 1px solid #cbd5e1;
      }
      
      /* 답변 스타일 */
      .answer-bubble {
        background-color: white !important;
        color: #1e293b !important;
        border: 1px solid #e2e8f0;
      }
      
      /* 버튼 숨기기 */
      button {
        display: none !important;
      }
      
      /* 링크 색상 */
      a {
        color: #1e293b !important;
        text-decoration: underline;
      }
      
      /* 코드 블록 */
      pre, code {
        background-color: #f8fafc !important;
        border: 1px solid #e2e8f0;
        color: #1e293b !important;
      }
    }
    
    /* 프린트 전용 헤더 (화면에서는 숨김) */
    .print-header {
      display: none;
    }
  </style>
</head>
<body class="bg-gradient-to-br from-slate-50 to-slate-100 min-h-screen">
  <!-- 로그인 전 화면 -->
  <div id="authScreen" class="hidden">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8">
        <div class="flex items-center justify-center gap-3 mb-6">
          <div class="w-12 h-12 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"/><line x1="6" x2="6.01" y1="17" y2="17"/><line x1="10" x2="10.01" y1="17" y2="17"/><path d="m14 8 5-5"/></svg>
          </div>
          <div>
            <h1 class="text-2xl font-bold text-slate-800">법령·회계 검색</h1>
            <p class="text-sm text-slate-500">기업 전문 통합 검색</p>
          </div>
        </div>

        <!-- 탭 -->
        <div class="flex mb-6 bg-slate-100 p-1 rounded-lg">
          <button id="loginTab" class="flex-1 py-2 px-4 rounded-md bg-white shadow-sm font-medium text-slate-800 transition-all">로그인</button>
          <button id="registerTab" class="flex-1 py-2 px-4 rounded-md text-slate-600 hover:text-slate-800 transition-all">회원가입</button>
        </div>

        <!-- 로그인 폼 -->
        <form id="loginForm" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">이메일</label>
            <input type="email" id="loginEmail" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="email@example.com" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
            <input type="password" id="loginPassword" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="••••••••" required>
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-4 rounded-lg font-medium transition-colors">로그인</button>
        </form>

        <!-- 회원가입 폼 -->
        <form id="registerForm" class="space-y-4 hidden">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">이름</label>
            <input type="text" id="registerName" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="홍길동" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">이메일</label>
            <input type="email" id="registerEmail" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="email@example.com" required>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">비밀번호</label>
            <input type="password" id="registerPassword" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" placeholder="••••••••" required>
          </div>
          <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-4 rounded-lg font-medium transition-colors">회원가입</button>
        </form>

        <div id="authError" class="hidden mt-4 p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>
      </div>
    </div>
  </div>

  <!-- 승인 대기 화면 -->
  <div id="pendingScreen" class="hidden">
    <div class="min-h-screen flex items-center justify-center p-4">
      <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-8 text-center">
        <div class="w-20 h-20 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#f59e0b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <h2 class="text-2xl font-bold text-slate-800 mb-2">관리자 승인 대기 중</h2>
        <p class="text-slate-600 mb-6">관리자 승인 후 서비스를 이용하실 수 있습니다.</p>
        <button onclick="logout()" class="text-indigo-600 hover:text-indigo-700 font-medium">로그아웃</button>
      </div>
    </div>
  </div>

  <!-- 메인 검색 화면 -->
  <div id="mainScreen" class="hidden">
    <!-- 헤더 -->
    <div class="bg-white border-b border-slate-200 sticky top-0 z-10 no-print">
      <div class="max-w-5xl mx-auto px-4 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-10 h-10 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-xl flex items-center justify-center">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 16v1a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V7a2 2 0 0 1 2-2h2m5.66 0H14a2 2 0 0 1 2 2v3.34l1 1L23 7v10"/></svg>
          </div>
          <div>
            <h1 class="text-xl font-bold text-slate-800">기업 법령·회계 통합 검색</h1>
            <p class="text-xs text-slate-500">회계·세무 · 무역·관세 · 금융·재무 · 노무 · 법률·계약 · 소비자·민원 · IT·시스템</p>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span id="userName" class="text-sm text-slate-600"></span>
          <button onclick="openSettings()" class="text-sm text-slate-600 hover:text-indigo-600 font-medium flex items-center gap-1">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
            설정
          </button>
          <button onclick="logout()" class="text-sm text-indigo-600 hover:text-indigo-700 font-medium">로그아웃</button>
        </div>
      </div>
    </div>

    <div class="max-w-5xl mx-auto px-4 py-6">
      <!-- 카테고리 선택 -->
      <div class="mb-6 no-print">
        <h2 class="text-sm font-semibold text-slate-600 mb-3 flex items-center gap-2">
          <span class="w-6 h-6 bg-slate-200 rounded-full flex items-center justify-center text-xs font-bold">1</span>
          분야 선택
        </h2>
        <div id="categories" class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-7 gap-3"></div>
      </div>

      <!-- 검색 영역 -->
      <div id="searchArea" class="hidden mb-6 no-print"></div>

      <!-- 결과 영역 -->
      <div id="resultArea" class="hidden"></div>
    </div>
  </div>

  <!-- 설정 모달 -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-2xl shadow-xl w-full max-w-md p-6">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-xl font-bold text-slate-800">설정</h2>
        <button onclick="closeSettings()" class="text-slate-400 hover:text-slate-600">
          <i data-lucide="x" class="w-6 h-6"></i>
        </button>
      </div>

      <!-- 비밀번호 변경 폼 -->
      <form id="changePasswordForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">현재 비밀번호</label>
          <input type="password" id="currentPassword" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">새 비밀번호 (최소 6자)</label>
          <input type="password" id="newPassword" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" minlength="6" required>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">새 비밀번호 확인</label>
          <input type="password" id="confirmPassword" class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-transparent" minlength="6" required>
        </div>
        <div id="passwordError" class="hidden p-3 bg-red-50 border border-red-200 rounded-lg text-red-700 text-sm"></div>
        <div id="passwordSuccess" class="hidden p-3 bg-green-50 border border-green-200 rounded-lg text-green-700 text-sm"></div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-2.5 px-4 rounded-lg font-medium transition-colors">비밀번호 변경</button>
      </form>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
